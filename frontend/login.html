<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link rel="stylesheet" href="/styles.css">
</head>

<body>

<div class="auth-container">

    <h1>Login</h1>

    <form id="login-form">

        <input
            type="text"
            id="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <p>
        No account?
        <a href="/register.html">
            Register
        </a>
    </p>

</div>

<script>

document
    .getElementById("login-form")
    .addEventListener(
        "submit",
        async (e) => {

            e.preventDefault();

            const response = await fetch(
                "/api/auth/login",
                {
                    method: "POST",

                    headers: {
                        "Content-Type":
                            "application/json",
                    },

                    body: JSON.stringify({
                        username:
                            document.getElementById(
                                "username"
                            ).value,

                        password:
                            document.getElementById(
                                "password"
                            ).value,
                    }),
                }
            );

            if (!response.ok) {
                alert("Login failed");
                return;
            }

            const data =
                await response.json();

            localStorage.setItem(
                "token",
                data.access_token,
            );

            window.location.href = "/";
        }
    );

</script>

</body>
</html>
