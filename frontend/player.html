<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>OTT Simulator</title>
    
        <style>
        body {
            font-family: Arial, sans-serif;
            background: #141414;
            color: white;
            margin: 0;
            padding: 20px;
        }
    
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
    
        .navbar {
            margin-bottom: 24px;
        }
    
        .navbar a {
            color: #e50914;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
        }
    
        #title {
            margin-bottom: 20px;
        }
    
        #video-player {
            width: 100%;
            max-height: 700px;
    
            background: black;
    
            border-radius: 8px;
    
            box-shadow:
                0 0 20px rgba(0, 0, 0, 0.5);
        }
    
        .description {
            margin-top: 20px;
            color: #cccccc;
            line-height: 1.6;
        }
    </style>
    </head>

    <body>

        <div class="container">

            <div class="navbar">
                <a href="/">← Back to Catalog</a>
            </div>

            <h1 id="title"></h1>

            <video id="video-player" controls>
            </video>

            <p id="description" class="description">
            </p>
            
            </div>

        <script>
const params =
    new URLSearchParams(window.location.search);

const movieId = params.get("id");

async function loadMovie() {

    const response = await fetch(
        `http://localhost:8100/movies/${movieId}`
    );

    const movie = await response.json();

    document.getElementById("title").innerText =
        movie.title;

    document.getElementById("description").innerText =
        movie.description;

    const player =
        document.getElementById("video-player");

    player.src = movie.stream_url;

        // play event
        player.addEventListener(
            "play",
            () => {

                sendWatchEvent(
                    "PLAY",
                    player.currentTime,
                );
            }
        );
        // pause event
        player.addEventListener(
            "pause",
            () => {

                sendWatchEvent(
                    "PAUSE",
                    player.currentTime,
                );
            }
        );
        //  complete event
        player.addEventListener(
            "ended",
            () => {

                sendWatchEvent(
                    "COMPLETE",
                    player.duration,
                );
            }
        );

        // seek event
        player.addEventListener(
            "seeked",
            () => {

                sendWatchEvent(
                    "SEEK",
                    player.currentTime,
                );
            }
        );
    }

    async function sendWatchEvent(
        eventType,
        positionSeconds,
    ) {

        const token =
            localStorage.getItem("token");

        if (!token) {
            return;
        }

                        try {

                            await fetch(
                                "http://localhost:8100/events",
                                {
                                    method: "POST",

                                    headers: {
                                        "Content-Type":
                                            "application/json",

                                        Authorization:
                                            `Bearer ${token}`,
                                    },

                                    body: JSON.stringify({
                                        movie_id: Number(movieId),
                                        event_type: eventType,
                                        position_seconds:
                                            Math.floor(
                                                positionSeconds
                                            ),
                                    }),
                                }
                            );

                        } catch (error) {

                            console.error(
                                "Failed to send event",
                                error,
                            );
                        }
                    }
                

loadMovie();
</script>

    </body>
</html>
