<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>OTT Simulator</title>

    <link href="https://vjs.zencdn.net/8.23.4/video-js.css" rel="stylesheet" />

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #141414;
            color: white;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .navbar {
            margin-bottom: 24px;
        }

        .navbar a {
            color: #e50914;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
        }

        #title {
            margin-bottom: 20px;
        }

        .video-js {
            width: 100%;
            max-height: 700px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .description {
            margin-top: 20px;
            color: #cccccc;
            line-height: 1.6;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="navbar">
            <a href="/">← Back to Catalog</a>
        </div>

        <h1 id="title"></h1>

        <video id="video-player" class="video-js vjs-big-play-centered" controls preload="auto"></video>

        <p id="description" class="description"></p>

    </div>

    <script src="https://vjs.zencdn.net/8.23.4/video.min.js"></script>

    <script>

        const params = new URLSearchParams(window.location.search);

        const movieId = params.get("id");

        const player = videojs("video-player", {
            html5: {
                vhs: {
                    overrideNative: true,
                },
            },
        });

        if (videojs.Vhs && videojs.Vhs.xhr) {

            videojs.Vhs.xhr.beforeRequest = function (options) {

                const token = localStorage.getItem("token");


                if (token) {
                    options.headers = {
                        ...options.headers,
                        Authorization: `Bearer ${token}`,
                    };
                }


            return options;
        };
    }
        async function loadProgress(movieId) {

            const token = localStorage.getItem("token");

            if (!token) {
                return;
            }

            const response = await fetch(
                `/api/watch_progress/movie/${movieId}`,
                {
                    headers: {
                        Authorization: `Bearer ${token}`,
                    },
                },
            );

            if (!response.ok) {
                return;
            }

            const progress = await response.json();

            if (progress) {
                player.currentTime(
                    progress.last_position_seconds,
                );
            }
        }

        async function loadMovie() {

            const token = localStorage.getItem("token");

            if (!token) {
                window.location.href = "/login.html";
                return;
            }

            const response = await fetch(
                `/api/movies/${movieId}`,
                {
                    headers: {
                        Authorization: `Bearer ${token}`,
                    },
                },
            );

            if (response.status === 401) {

                localStorage.removeItem("token");

                window.location.href = "/login.html";

                return;
            }

            const movie = await response.json();

            document.getElementById("title").innerText =
                movie.title;

            document.getElementById("description").innerText =
                movie.description;

            if (!movie.hls_url) {

                alert("This movie is still being processed.");

                window.location.href = "/";

                return;
            }

            player.src({
                src: movie.hls_url,
                type: "application/x-mpegURL",
            });

            await new Promise((resolve) => {
                player.one(
                    "loadedmetadata",
                    resolve,
                );
            });

            await loadProgress(movieId);

            player.on("play", () => {
                sendWatchEvent(
                    "PLAY",
                    player.currentTime(),
                );
            });

            player.on("pause", () => {
                sendWatchEvent(
                    "PAUSE",
                    player.currentTime(),
                );
            });

            player.on("ended", () => {
                sendWatchEvent(
                    "COMPLETE",
                    player.duration(),
                );
            });

            player.on("seeked", () => {
                sendWatchEvent(
                    "SEEK",
                    player.currentTime(),
                );
            });
        }

                        async function sendWatchEvent(
                            eventType,
                            positionSeconds,
                        ) {

            const token = localStorage.getItem("token");

                        if (!token) {
                            return;
                        }

                        try {

                        await fetch(
                            "/api/events",
                            {
                                method: "POST",

                            headers: {
                                "Content-Type": "application/json",

                                Authorization: `Bearer ${token}`,
                            },

                            body: JSON.stringify({
                                movie_id: Number(movieId),
                                event_type: eventType,
                                position_seconds: Math.floor(positionSeconds),
                            }),
                        },
                    );

                    } catch (error) {

                            console.error(
                                "Failed to send event",
                                error,
                            );
                        }
                    }

        loadMovie();

    </script>

</body>

</html>
