<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <link rel="stylesheet" href="/styles.css">
</head>

<body>

<div class="auth-container">

    <h1>Register</h1>

    <form id="register-form">

        <input
            type="text"
            id="username"
            placeholder="Username"
            required
        >

        <input
            type="email"
            id="email"
            placeholder="Email"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Register
        </button>

    </form>

</div>

<script>

document
    .getElementById("register-form")
    .addEventListener(
        "submit",
        async (e) => {

            e.preventDefault();

            const response = await fetch(
                "http://localhost:8100/auth/register",
                {
                    method: "POST",

                    headers: {
                        "Content-Type":
                            "application/json",
                    },

                    body: JSON.stringify({
                        username:
                            document.getElementById(
                                "username"
                            ).value,

                        email:
                            document.getElementById(
                                "email"
                            ).value,

                        password:
                            document.getElementById(
                                "password"
                            ).value,
                    }),
                }
            );

            if (!response.ok) {
                alert("Registration failed");
                return;
            }

            window.location.href =
                "/login.html";
        }
    );

</script>

</body>
</html>
